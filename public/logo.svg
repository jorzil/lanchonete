<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320" fill="none">
  <!-- Shadow layer for SUB -->
  <text x="272" y="298" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="178" letter-spacing="-4" text-anchor="middle" fill="#0B2C5C">SUB</text>
  <!-- Shadow layer for mais -->
  <text x="262" y="132" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="112" letter-spacing="-2" text-anchor="middle" fill="#0B2C5C" transform="skewX(-4)">mais</text>

  <!-- mais — white with navy stroke -->
  <text
    x="258" y="126"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="112"
    letter-spacing="-2"
    text-anchor="middle"
    fill="white"
    stroke="#0B2C5C"
    stroke-width="7"
    paint-order="stroke fill"
    transform="skewX(-4)"
  >mais</text>

  <!-- SUB — orange with navy stroke -->
  <text
    x="260" y="292"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="178"
    letter-spacing="-4"
    text-anchor="middle"
    fill="#E84B10"
    stroke="#0B2C5C"
    stroke-width="10"
    paint-order="stroke fill"
  >SUB</text>
</svg>
